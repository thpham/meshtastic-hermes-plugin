name: meshtastic-platform
label: Meshtastic
kind: platform
version: "0.1.0"
description: >-
  Meshtastic LoRa mesh gateway adapter for Hermes Agent. Relays inbound mesh text
  messages to the agent and sends the agent's replies back over the radio. Direct
  messages are end-to-end (PKI) encrypted; replies default to direct messages only.
author: Thomas Pham

requires_env:
  - name: MESHTASTIC_HOST
    description: "Meshtastic node host/IP to connect to over TCP (e.g. 192.168.55.73)."
    prompt: "Meshtastic node host/IP"
    password: false

optional_env:
  - name: MESHTASTIC_REPLY_ALL
    description: "Reply on every channel incl. public Primary (1/true/yes). Default: DMs only."
    prompt: "Reply on all channels? (true/false)"
    password: false
  - name: MESHTASTIC_REPLY_CHANNELS
    description: "Reply on DMs plus these channel indices, e.g. '1' or '1,2' (your private channels). Public Primary (0) is excluded unless listed."
    prompt: "Reply channels (comma-separated indices, or empty)"
    password: false
  - name: MESHTASTIC_HERMES_DB
    description: "Path to the node-interaction knowledge-base SQLite file (defaults under $HERMES_HOME)."
    prompt: "Knowledge-base DB path (or empty)"
    password: false
  - name: MESHTASTIC_DEBUG
    description: "Set to 1 to log inbound messages and reply/skip decisions to the gateway journal."
    prompt: "Enable debug logging? (1/true)"
    password: false
  - name: MESHTASTIC_ALLOWED_USERS
    description: "Comma-separated node ids allowed to talk to the agent, e.g. '!a696579c,!0aca4a9c'. Empty + allow-all off = nobody (deny by default)."
    prompt: "Allowed node ids (comma-separated)"
    password: false
  - name: MESHTASTIC_ALLOW_ALL_USERS
    description: "Allow any node on the mesh to talk to the agent (1/true). Use with care on public channels."
    prompt: "Allow all users? (true/false)"
    password: false
